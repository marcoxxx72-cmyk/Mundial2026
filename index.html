<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#06080f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Mundial 2026"/>
<title>Mundial 2026</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at top,#0c1e44,#06080f 70%);color:#eee8d5;font-family:'Rajdhani','Trebuchet MS',sans-serif;min-height:100vh;overflow-x:hidden}
:root{--gold:#d4af37;--dark:#06080f;--card:rgba(8,12,30,0.92);--border:rgba(212,175,55,0.2)}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(212,175,55,0.3)}50%{box-shadow:0 0 50px rgba(212,175,55,0.8)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.shimmer{background:linear-gradient(90deg,#d4af37 0%,#fff8e0 25%,#d4af37 50%,#fff8e0 75%,#d4af37 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
.float{animation:float 3s ease-in-out infinite}
.glow{animation:glow 2s ease-in-out infinite}
.fade{animation:fadeIn 0.4s ease forwards}
.bebas{font-family:'Bebas Neue',Arial Black,sans-serif}
.raj{font-family:'Rajdhani',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
header{background:linear-gradient(180deg,#02060f,#050d20);border-bottom:2px solid var(--gold);box-shadow:0 4px 60px rgba(212,175,55,0.3);position:relative;z-index:10}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px}
.lang-btn{border-radius:8px;padding:3px 8px;cursor:pointer;font-size:11px;font-weight:700;border:none;transition:all 0.2s}
.lang-btn.active{background:linear-gradient(135deg,var(--gold),#b8963e);color:#0a0a1a}
.lang-btn.inactive{background:rgba(255,255,255,0.06);border:1px solid rgba(212,175,55,0.25)!important;color:#7a96b0}
.hero{padding:14px 14px 20px;text-align:center;position:relative}
.hero-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:280px;background:radial-gradient(circle,rgba(212,175,55,0.1),transparent 70%);pointer-events:none}
.hero-inner{display:flex;align-items:center;justify-content:center;gap:14px}
.premium-bar{background:linear-gradient(90deg,#120a00,#2e1800,#120a00);border-bottom:1px solid rgba(212,175,55,0.3);padding:7px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;position:relative;z-index:9}
nav{position:sticky;top:0;z-index:20;display:flex;justify-content:center;flex-wrap:wrap;gap:3px;background:rgba(3,6,18,0.98);backdrop-filter:blur(16px);padding:8px 10px;border-bottom:1px solid var(--border)}
.nav-btn{border-radius:20px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all 0.2s;border:none}
.nav-btn.active{background:linear-gradient(135deg,var(--gold),#b8963e);color:#0a0a1a;font-weight:900}
.nav-btn.inactive{background:transparent;color:#6a86a0;border:1px solid var(--border)!important}
main{padding:16px 13px;max-width:760px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.card-gold{background:linear-gradient(135deg,rgba(212,175,55,0.16),rgba(184,150,62,0.08));border:1px solid var(--gold);border-radius:16px;padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid2s{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.col{display:flex;flex-direction:column;gap:10px}
.countdown-box{background:linear-gradient(135deg,rgba(5,12,40,0.98),rgba(10,25,80,0.95));border:2px solid var(--gold);border-radius:22px;padding:22px 16px;text-align:center;margin-bottom:16px}
.cd-num{background:linear-gradient(160deg,var(--gold),#b8963e);border-radius:12px;padding:10px 12px;font-size:24px;font-weight:900;color:#0a0a1a;min-width:46px;font-family:'Bebas Neue',sans-serif;box-shadow:0 4px 20px rgba(212,175,55,0.5);display:inline-block}
.cd-label{font-size:8px;color:#5a76a0;margin-top:4px;letter-spacing:2px}
.cd-row{display:flex;justify-content:center;gap:10px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8963e);border:none;border-radius:12px;padding:12px 0;font-size:13px;font-weight:900;color:#0a0a1a;cursor:pointer;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;width:100%;margin-top:8px}
.btn-red{background:rgba(255,40,40,0.1);border:1px solid rgba(255,60,60,0.3);border-radius:12px;padding:12px 0;font-size:12px;color:#ff6b6b;cursor:pointer;flex:1}
.tag-gold{font-size:9px;color:var(--gold);background:rgba(212,175,55,0.12);padding:2px 8px;border-radius:8px;border:1px solid rgba(212,175,55,0.3)}
.pos-tag{border-radius:6px;padding:2px 6px;font-size:8px;color:#fff;font-weight:bold}
.fifa-card{border:2px solid var(--gold);border-radius:18px;padding:14px;cursor:pointer;position:relative;overflow:hidden;min-height:210px;transition:transform 0.2s;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.fifa-card:active{transform:scale(0.97)}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.93);display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(10px)}
.modal-content{border:2px solid var(--gold);border-radius:22px;padding:22px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto}
.poll-bar-bg{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.poll-bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}
footer{text-align:center;padding:16px;font-size:10px;color:#2e4060;border-top:1px solid var(--border);margin-top:16px;letter-spacing:2px}
select{background:rgba(4,8,20,0.97);color:#eee8d5;border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;-webkit-appearance:none;font-family:'Rajdhani',sans-serif;width:100%}
</style>
</head>

    +'<div class="card-gold" style="margin-bottom:12px"><div class="bebas" style="font-size:14px;color:var(--gold);margin-bottom:10px;letter-spacing:1px">🏆 CHAMPION DU MONDE 2026</div><select onchange="S.winner=this.value;render()" style="border:1px solid var(--gold)">'+teamOpts(S.winner)+'</select>'+(S.winner?'<div class="raj" style="margin-top:8px;font-size:12px;color:var(--gold)">✨ Mon choix : <strong>'+S.winner+'</strong></div>':"")+'</div>'
    +'<div class="card" style="margin-bottom:12px"><div class="bebas" style="font-size:14px;color:#c0c0c0;margin-bottom:10px">🥈 FINALISTE</div><select onchange="S.finalist=this.value;render()" style="border:1px solid rgba(192,192,192,0.3)">'+teamOpts(S.finalist)+'</select></div>'
    +'<div class="card" style="margin-bottom:14px"><div class="bebas" style="font-size:14px;color:#cd7f32;margin-bottom:10px">🥉 DEMI-FINALISTES</div><div class="grid2s"><select onchange="S.semi1=this.value;render()" style="border:1px solid rgba(205,127,50,0.3)">'+teamOpts(S.semi1)+'</select><select onchange="S.semi2=this.value;render()" style="border:1px solid rgba(205,127,50,0.3)">'+teamOpts(S.semi2)+'</select></div></div>'
    +((S.winner||S.finalist)?'<div class="card" style="margin-bottom:14px;text-align:center;padding:20px"><div class="bebas" style="font-size:13px;color:var(--gold);margin-bottom:12px;letter-spacing:2px">🎯 MON BRACKET</div><div style="display:flex;flex-direction:column;gap:8px;align-items:center">'+(S.winner?'<div class="bebas" style="background:linear-gradient(135deg,var(--gold),#b8963e);color:#0a0a1a;border-radius:12px;padding:9px 22px;font-size:14px">🏆 '+S.winner+'</div>':"")+(S.finalist?'<div class="raj" style="background:rgba(192,192,192,0.15);border:1px solid rgba(192,192,192,0.3);border-radius:12px;padding:7px 18px;font-size:13px">🥈 '+S.finalist+'</div>':"")+'</div></div>':"")
    +'<div style="display:flex;gap:10px"><button onclick="saveP()" style="flex:2;background:'+(S.pronoSaved?"linear-gradient(135deg,#1a6b1a,#2a9e2a)":"linear-gradient(135deg,var(--gold),#b8963e)")+';border:none;border-radius:12px;padding:13px 0;font-size:13px;font-weight:900;color:'+(S.pronoSaved?"#fff":"#0a0a1a")+';cursor:pointer;font-family:'Bebas Neue',sans-serif;letter-spacing:2px">'+(S.pronoSaved?"✅ SAUVEGARDÉ !":"💾 SAUVEGARDER")+'</button><button class="btn-red" onclick="S.winner='';S.finalist='';S.semi1='';S.semi2='';render()">Effacer</button></div></div>';
  }
  else if(S.tab===4){
    if(!S.quizDone){
      var q=QUIZ[S.qIdx];
      content='<div class="fade"><div class="bebas" style="font-size:14px;color:var(--gold);margin-bottom:14px;text-align:center;letter-spacing:3px">🧠 QUIZ MUNDIAL 2026</div><div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#5a76a0;margin-bottom:6px"><span>Question '+(S.qIdx+1)+"/"+QUIZ.length+'</span><span>Score : '+S.score+' ⭐</span></div><div style="height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden"><div style="width:'+(S.qIdx/QUIZ.length*100)+'%;height:100%;background:linear-gradient(90deg,var(--gold),#ff9900);border-radius:3px;transition:width 0.5s"></div></div></div><div class="card" style="margin-bottom:13px;padding:22px;text-align:center"><div class="raj" style="font-size:16px;font-weight:700;line-height:1.5;color:#fff">'+q.q+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+q.opts.map(function(opt,i){var bg="rgba(8,12,30,0.92)",bd="var(--border)",cl="#eee8d5",fw=400,pre="";if(S.answered){if(i===q.a){bg="rgba(30,160,60,0.25)";bd="rgba(40,200,80,0.7)";cl="#7fff7f";fw=700;pre="✓ ";}else if(i===S.selected){bg="rgba(200,30,30,0.25)";bd="rgba(220,50,50,0.7)";cl="#ff8888";pre="✗ ";}}return'<button onclick="ansQ('+i+')" style="background:'+bg+';border:1.5px solid '+bd+';border-radius:12px;padding:13px 10px;font-size:13px;color:'+cl+';cursor:pointer;text-align:center;font-weight:'+fw+';font-family:'Rajdhani',sans-serif">'+pre+opt+'</button>';}).join("")+'</div>'+(S.answered?'<button class="btn-gold" onclick="nextQ()">'+(S.qIdx<QUIZ.length-1?"QUESTION SUIVANTE →":"VOIR MON RÉSULTAT 🏆")+'</button>':"")+'</div>';
    } else {
      var pt=Math.round(S.score/QUIZ.length*100),em=S.score===QUIZ.length?"🏆":S.score>=7?"⭐":S.score>=5?"👍":"📚",mg=S.score===QUIZ.length?"PARFAIT ! Expert absolu !":S.score>=7?"Très bien !":S.score>=5?"Pas mal !":"Continue !";
      content='<div class="fade" style="text-align:center"><div class="glow" style="background:linear-gradient(135deg,rgba(212,175,55,0.2),rgba(184,150,62,0.1));border:2px solid var(--gold);border-radius:20px;padding:30px;margin-bottom:16px"><div style="font-size:52px;margin-bottom:12px">'+em+'</div><div class="bebas" style="font-size:44px;color:var(--gold);letter-spacing:2px">'+S.score+"/"+QUIZ.length+'</div><div class="raj" style="font-size:14px;color:#eee;margin-top:10px">'+mg+'</div></div><div class="card" style="margin-bottom:16px"><div style="height:10px;background:rgba(255,255,255,0.07);border-radius:5px;overflow:hidden"><div style="width:'+pt+'%;height:100%;background:linear-gradient(90deg,var(--gold),#ff9900);border-radius:5px"></div></div><div class="raj" style="font-size:13px;color:#5a76a0;margin-top:8px">'+pt+"% de réussite</div></div><button class="btn-gold" style="max-width:280px;margin:0 auto" onclick="resetQ()">🔄 REJOUER</button></div>";
    }
  }
  else if(S.tab===5){
    content='<div class="fade"><div class="bebas" style="font-size:14px;color:var(--gold);margin-bottom:14px;text-align:center;letter-spacing:3px">📢 SONDAGES COMMUNAUTÉ</div><div style="display:flex;flex-direction:column;gap:14px">'+POLLS.map(function(poll){var voted=S.pollVotes[poll.id]!==undefined,cv=getPV(poll.id,poll.votes),total=cv.reduce(function(a,b){return a+b;},0);return'<div class="card" style="padding:18px"><div class="raj" style="font-size:14px;font-weight:900;color:#fff;margin-bottom:14px;line-height:1.4">'+poll.q+'</div>'+(!voted?poll.opts.map(function(opt,i){return'<button onclick="voteP(''+poll.id+'','+i+')" style="background:rgba(8,12,30,0.92);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13px;color:#eee8d5;cursor:pointer;text-align:left;width:100%;margin-bottom:8px;font-family:'Rajdhani',sans-serif">'+opt+'</button>';}).join(""):cv.map(function(v,i){var pct=Math.round(v/total*100),isMe=S.pollVotes[poll.id]===i,isWin=v===Math.max.apply(null,cv);return'<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;font-family:'Rajdhani',sans-serif"><span style="color:'+(isMe?"var(--gold)":isWin?"#fff":"#7a96b0")+';font-weight:'+(isWin?700:400)+'">'+( isMe?"→ ":"")+poll.opts[i]+(isMe?" ✓":"")+(isWin&&!isMe?" 🔥":"")+'</span><span class="bebas" style="color:'+(isWin?"var(--gold)":"#5a76a0")+'">'+pct+'%</span></div><div class="poll-bar-bg"><div class="poll-bar-fill" style="width:'+pct+'%;background:'+(isMe?"linear-gradient(90deg,var(--gold),#ff9900)":isWin?"rgba(212,175,55,0.45)":"rgba(80,120,180,0.35)")+'"></div></div></div>';}).join("")+'<div class="raj" style="font-size:10px;color:#5a76a0;margin-top:4px">'+total.toLocaleString()+' votes</div>')+'</div>';}).join("")+'</div></div>';
  }
  document.getElementById("app").innerHTML=
    (S.selPlayer?playerModal(S.selPlayer):"")
    +'<div style="position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle at 10% 10%,rgba(212,175,55,0.05),transparent 40%)"></div>'
    +'<header>'
    +'<div class="top-bar"><div style="display:flex;gap:4px">'+["fr","en","es","pt"].map(function(l){return'<button class="lang-btn '+(S.lang===l?"active":"inactive")+'" onclick="setLang(''+l+'')">'+({"fr":"🇫🇷 FR","en":"🇬🇧 EN","es":"🇪🇸 ES","pt":"🇧🇷 PT"})[l]+'</button>';}).join("")+'</div>'
    +'<div style="display:flex;gap:6px;align-items:center">'
    +'<button onclick="shareApp()" style="background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:3px 10px;cursor:pointer;color:#7a96b0;font-size:11px">📤</button>'
    +(!S.premium?'<button onclick="S.premium=true;render()" style="background:linear-gradient(135deg,var(--gold),#ff9900);border:none;border-radius:8px;padding:4px 10px;cursor:pointer;color:#0a0a1a;font-size:11px;font-weight:900;font-family:'Bebas Neue',sans-serif">⭐ PRO</button>'
    :'<span class="bebas" style="font-size:11px;color:var(--gold);background:rgba(212,175,55,0.12);padding:4px 10px;border-radius:8px;border:1px solid var(--gold)">⭐ PRO</span>')
    +'</div></div>'
    // HERO avec logo FIFA officiel
    +'<div class="hero"><div class="hero-glow"></div>'
    +'<div class="hero-inner">'
    +'<div class="float">'+fifaLogo(78)+'</div>'
    +'<div><div class="bebas shimmer" style="font-size:12px;letter-spacing:6px;margin-bottom:0">FIFA</div>'
    +'<div class="bebas shimmer" style="font-size:28px;letter-spacing:3px;line-height:1.1">WORLD CUP</div>'
    +'<div class="bebas shimmer" style="font-size:50px;letter-spacing:2px;line-height:1">2026</div>'
    +'<div style="font-size:8px;color:rgba(212,175,55,0.6);letter-spacing:2px;margin-top:3px">UNITED STATES | CANADA | MÉXICO</div>'
    +'</div>'
    +'<div class="float" style="animation-delay:1.5s;transform:scaleX(-1)">'+fifaLogo(78)+'</div>'
    +'</div></div></header>'
    +(!S.premium?'<div class="premium-bar"><span class="raj" style="font-size:10px;color:var(--gold)">🌟 PREMIUM — Cartes FIFA + Stats + Pronostics illimités</span><button onclick="S.premium=true;render()" style="background:linear-gradient(135deg,var(--gold),#b8963e);border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:900;color:#0a0a1a;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Bebas Neue',sans-serif">1,99€</button></div>':"")
    +'<nav>'+nav.map(function(label,i){return'<button class="nav-btn '+(S.tab===i?"active":"inactive")+'" onclick="setTab('+i+')">'+label+'</button>';}).join("")+'</nav>'
    +'<main>'+content+'</main>'
    +'<footer class="bebas">MUNDIAL 2026™ • '+(S.premium?"⭐ PREMIUM":"FREE")+' • V5 BEASTMODE • mundial2026-marco.netlify.app</footer>';
}
function setTab(i){S.tab=i;render();}
function setLang(l){S.lang=l;render();}
function setGroup(g){S.selGroup=g;render();}
function setFP(f){S.filterPos=f;render();}
function openP(id){S.selPlayer=PLAYERS.filter(function(p){return p.id===id;})[0];render();}
function closeP(e){if(!e||e.target.className==="modal-overlay"){S.selPlayer=null;render();}}
function saveP(){S.pronoSaved=true;render();setTimeout(function(){S.pronoSaved=false;render();},2000);}
function ansQ(i){if(S.answered)return;S.selected=i;S.answered=true;if(i===QUIZ[S.qIdx].a)S.score++;render();}
function nextQ(){if(S.qIdx<QUIZ.length-1){S.qIdx++;S.selected=null;S.answered=false;}else S.quizDone=true;render();}
function resetQ(){S.qIdx=0;S.selected=null;S.score=0;S.quizDone=false;S.answered=false;render();}
function voteP(pid,oi){if(S.pollVotes[pid]!==undefined)return;var poll=POLLS.filter(function(p){return p.id===pid;})[0];S.pollCounts[pid]=poll.votes.map(function(v,i){return i===oi?v+1:v;});S.pollVotes[pid]=oi;render();}
function shareApp(){if(navigator.share){navigator.share({title:"Mundial 2026",url:"https://mundial2026-marco.netlify.app"});}else{navigator.clipboard&&navigator.clipboard.writeText("https://mundial2026-marco.netlify.app");}}
render();
if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(function(){});
</script>
</body>
</html>
