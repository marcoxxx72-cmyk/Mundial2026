name: Build Android AAB

on:
  workflow_dispatch:  # Manuel - tu cliques "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Init Bubblewrap
        run: |
          bubblewrap init \
            --manifest=https://wc-2026-app.vercel.app/manifest.json \
            --package-id=com.marco72.mundial2026 \
            --name="World Cup 2026" \
            --short-name="WC 2026" \
            --signing-key-store=./keystore.jks \
            --signing-key-alias=mundial2026 \
            --signing-key-store-password=mundial2026pass \
            --signing-key-alias-password=mundial2026pass
        continue-on-error: true

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "com.marco72.mundial2026",
            "host": "wc-2026-app.vercel.app",
            "name": "World Cup 2026",
            "launcherName": "WC 2026",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#08091a",
            "backgroundColor": "#08091a",
            "startUrl": "/",
            "iconUrl": "https://wc-2026-app.vercel.app/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "mundial2026"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://wc-2026-app.vercel.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableNotifications": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false
          }
          MANIFEST

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore keystore.jks \
            -alias mundial2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mundial2026pass \
            -keypass mundial2026pass \
            -dname "CN=Marco, OU=WC2026, O=Mundial, L=London, S=England, C=GB"

      - name: Build AAB
        run: bubblewrap build --skipPwaValidation

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v3
        with:
          name: mundial2026-release
          path: |
            app-release-bundle.aab
            keystore.jks
          retention-days: 30

